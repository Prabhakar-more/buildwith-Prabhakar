<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image tag</title>
</head>
<body>
    <p>img is a self closing tag.no need of closing img tag. img have two attributes (src and alt). 
     <li>src-- src is used to give the link or path of image.</li>
  <li>alt -- alt works only when src path is not working.</li></p>
    <img src="https://www.istockphoto.com/photo/eye-of-model-with-colorful-art-make-up-close-up-gm814423752-131755775" alt="eye"><br><br>
    <img style="height: 50%;", width="50%" src="lord-vishnu.jpg" alt="lord-vishnu"><br><br><br><br>

     <a href="https://example.com">
      <img style="height: 20%;", width="20%" src="click-me.webp" alt="Click me" />
    </a>
    <p>this image is clickable. we can put anything in anchor tag</p>
</body>
</html>
