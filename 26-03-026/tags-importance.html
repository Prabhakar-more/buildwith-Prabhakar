
<!--<!DOCTYPE html>: A declaration that tells the browser the document is written in HTML5, ensuring it renders the page in standards mode.-->
<!DOCTYPE html>

<!--<html lang="en">: The root element that wraps all content on the page, with the lang attribute specifying the page's language for accessibility and search engines.-->
<html lang="en">

<!--A container for metadata and links to external files (like CSS), holding information about the document that is not displayed on the page itself.-->
<head>

    <!--<meta charset="UTF-8">: Specifies the character encoding to ensure all special symbols and characters are displayed correctly in the browser.-->
    <meta charset="UTF-8">

    <!--<meta name="viewport" content="width=device-width, initial-scale=1.0">: Essential for responsive design, instructing the browser on how to scale the page for mobile devices.-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--<title>: Defines the title of the page, which appears in the browser's tab or window title bar and is used by search engines.-->
    <title>Document</title>
</head>

<!--<body>: Contains all the visible content of the web page, including text, images, and links. -->
<body>
    <!-- Your code is here--> 
</body>
</html>
