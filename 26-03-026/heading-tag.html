<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heading tag</title>
</head>
<body>
    <!--Headings are used to display important or main words to represent context-->
    <!-- Headings should accurately describe the content that follows, helping both users 
     and search engines understand the context of each section.-->

    <!-- h1 is given higher importance like page title (only one per page recommonded) -->
    <!--Defines the main title or subject of the entire page.-->
    <h1>Heading 1</h1>

    <!-- 1) Used for major sections or subtopics that fall directly under the <h1>'s main topic.
         2) You can use multiple <h2> tags on a page to break the content into logical, scannable chunks.-->
    <h2>Heading 2</h2>

    <!--1) Used for subsections that fall under an <h2> heading.
        2) They provide finer detail within a specific section, helping to organize long-form content further.-->
    <h3>Heading 3</h3>

    <!-- 1) These tags are for even finer subdivisions of content within the hierarchy.
         2) They are rarely used in practice, but when they are, they continue the logical flow of the document structure-->
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>

    <!--In case of h7 or any other unrecogizable tags , HTML treats them as normal paragraph. 
    Total 6 headings are ther from h1 to h6-->
    <h7>heading 7</h7>
</body>
</html>
