<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Input Attributes Demo</title>
</head>
<body>

<form action="#" method="POST" autocomplete="on">

  <h2>All Input Types & Attributes Demo</h2>

  <!--Text-->
  <label for="username">Username:</label>
  <input type="text" id="username" name="username" placeholder="Enter username" required minlength="3" maxlength="15" autocomplete="username" autofocus><br><br>

  <!--Password-->
  <label for="password">Password:</label>
  <input type="password" id="password" name="password" required minlength="6" maxlength="20" placeholder="Enter password"><br><br>

  <!--Email-->
  <label for="email">Email:</label>
  <input type="email" id="email" name="email" placeholder="example@mail.com" required><br><br>

  <!--Number-->
  <label for="age">Age:</label>
  <input type="number" id="age" name="age" min="1" max="100" step="1" value="18"><br><br>

  <!--Date-->
  <label for="dob">Date of Birth:</label>
  <input type="date" id="dob" name="dob" min="1950-01-01" max="2025-12-31"><br><br>

  <!--Time-->
  <label for="time">Preferred Time:</label>
  <input type="time" id="time" name="time"><br><br>

  <!--Color-->
  <label for="color">Favorite Color:</label>
  <input type="color" id="color" name="color" value="#ff0000"><br><br>

  <!--Range-->
  <label for="range">Satisfaction Level:</label>
  <input type="range" id="range" name="range" min="0" max="10" step="1"><br><br>

  <!--Tel-->
  <label for="phone">Phone:</label>
  <input type="tel" id="phone" name="phone" placeholder="1234567890" pattern="[0-9]{10}"><br><br>

  <!--URL-->
  <label for="website">Website:</label>
  <input type="url" id="website" name="website" placeholder="https://example.com"><br><br>

  <!--Search-->
  <label for="search">Search:</label>
  <input type="search" id="search" name="search" placeholder="Search here..."><br><br>

  <!--File-->
  <label for="file">Upload File:</label>
  <input type="file"id="file" name="file" accept=".jpg,.png,.pdf" multiple><br><br>

  <!--Checkbox-->
  <label>
    <input type="checkbox" name="agree" required>I agree to terms</label><br><br>

  <!--Radio-->
  <p>Select Gender:</p>
  <label><input type="radio" name="gender" value="male" required> Male</label>
  <label><input type="radio" name="gender" value="female"> Female</label>
  <label><input type="radio" name="gender" value="other"> Other</label><br><br>

  <!--randomaly-->
  <label for="readonly">Readonly Field:</label>
  <input type="text" id="readonly" value="You can't edit this" readonly><br><br>

  <!--Disabled-->
  <label for="disabled">Disabled Field:</label>
  <input type="text" id="disabled" value="Disabled input" disabled><br><br>

  <!--Hidden-->
  <input type="hidden" name="userid" value="12345">

  <!--Submit & Reset-->
  <input type="submit" value="Submit">
  <input type="reset" value="Reset">

</form>

</body>
</html>
